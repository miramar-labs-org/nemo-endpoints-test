name: Undeploy from NeMo

# Cancels a NeMo training job by name.

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: Name of the NeMo job to cancel
        required: true

permissions:
  contents: read

jobs:
  undeploy:
    runs-on: [self-hosted, dgx]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          docker network connect minikube "$(cat /etc/hostname)" 2>/dev/null || true
          sudo chmod -R a+rX "${HOME}/.minikube"
          TMP_KC=$(mktemp)
          sed "s|/home/[^/]*/\.minikube/|${HOME}/.minikube/|g" \
              "${HOME}/.kube/config" > "${TMP_KC}"
          echo "KUBECONFIG=${TMP_KC}" >> "${GITHUB_ENV}"

      - name: Set up /etc/hosts for NeMo endpoint
        run: |
          MINIKUBE_IP=$(kubectl get node minikube \
            -o jsonpath='{.status.addresses[?(@.type=="InternalIP")].address}')
          sudo sed -i '/nemo\.test/d' /etc/hosts || true
          printf '%s nemo.test\n' "$MINIKUBE_IP" | sudo tee -a /etc/hosts >/dev/null

      - name: Cancel job
        env:
          NEMO_HOST: http://nemo.test
          JOB_NAME: ${{ inputs.job_name }}
        run: python3 scripts/cancel_job.py

      - name: Summary
        if: always()
        run: |
          {
            echo "## NeMo Job Cancelled"
            echo "| | |"
            echo "|---|---|"
            echo "| Job name | \`${{ inputs.job_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
