# NeMo training job configuration.
# Edit this file, then trigger Deploy to NeMo to submit the job.

name: "nemo-endpoints-test-job"

# Base model to fine-tune.
# Examples: meta/llama-3.1-8b, nvidia/nemotron-mini-4b-instruct
model: "meta/llama-3.1-8b"

training:
  num_epochs: 1
  batch_size: 8
  learning_rate: 1.0e-4

  # Path or URI to the training dataset on the data store.
  # Upload via: curl -X POST http://data-store.test:8082/v1/hf/...
  dataset_path: ""

output:
  # Where to save the fine-tuned model (data store path or leave blank)
  model_path: ""
